services:
  urlshortenercrud:
    build: ./URLShortener
    ports:
      - "8081:8080"
    environment:
      MYSQL_HOST: host.docker.internal
  urlshortenerredirection:
    build: ./URLRedirection
    ports:
      - "8082:8080"
    environment:
      MYSQL_HOST: host.docker.internal

  urlshortenerfront:
    build: ./urlshortenerfront
    ports:
      - "5173:80"